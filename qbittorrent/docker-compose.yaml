networks:
  qbit:
    name: qbit
    driver: bridge

services:
  vpn:
    image: qmcgaw/gluetun
    container_name: vpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      # - 8888:8888/tcp # HTTP proxy
      - 8080:8080     # qBittorrent WebUI (optional, remove if not needed)
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=${VPN_TYPE}
      # OpenVPN:
      - OPENVPN_USER=${OPENVPN_USER}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
      - TZ=${TZ}
      - SERVER_COUNTRIES=${SERVER_COUNTRIES}
      # Server list updater
      # See https://github.com/qdm12/gluetun-wiki/blob/main/setup/servers.md#update-the-vpn-servers-list
      - UPDATER_PERIOD=${UPDATER_PERIOD}
    volumes:
      - ${VPN_CONFIG}:/gluetun
    networks:
      - qbit
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    # use https://ipleak.net/ to verify VPN is working
    network_mode: "service:vpn"       # routes all qBittorrent traffic through VPN container
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    volumes:
      - ${QBT_CONFIG}:/config
      - ${QBT_MEDIA}:/downloads #optional
    restart: unless-stopped
