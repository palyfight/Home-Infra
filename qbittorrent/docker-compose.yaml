networks:
  qbit:
    name: qbit
    driver: bridge

services:
  vpn:
    image: qmcgaw/gluetun
    container_name: vpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      # - 8888:8888/tcp # HTTP proxy
      - 8080:8080     # qBittorrent WebUI (optional, remove if not needed)
      - 8999:8999       # Torrent TCP
      - 8999:8999/udp   # Torrent UDP
    environment:
      - TZ=${TZ}
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=${VPN_TYPE}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - SERVER_COUNTRIES=${SERVER_COUNTRIES}
      - VPN_PORT_FORWARDING=on
      - PORT_FORWARD_ONLY=true
      - VPN_PORT_FORWARDING_STATUS_FILE=/tmp/gluetun/forwarded_port
    volumes:
      - ${VPN_CONFIG}:/gluetun
      - ${VPN_CONFIG}/tmp:/tmp/gluetun
    networks:
      - qbit
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    # use https://ipleak.net/ to verify VPN is working
    network_mode: "service:vpn"       # routes all qBittorrent traffic through VPN container
    depends_on:
      - vpn
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - ${QBT_CONFIG}:/config
      - ${QBT_HOST_PATH_DATA}:/data/torrents
    restart: unless-stopped

  gluetun-qbittorrent-port-manager:
    image: jopiermeier/gluetun-qbittorrent-port-manager:latest
    container_name: gluetun-qbittorrent-port-manager
    network_mode: "service:vpn"
    depends_on:
      - vpn
      - qbittorrent
    environment:
      - QBITTORRENT_SERVER=localhost
      - QBITTORRENT_PORT=8080
      - QBITTORRENT_USER=${QBIT_USER}
      - QBITTORRENT_PASS=${QBIT_PASS}
      - PORT_FILE=/tmp/gluetun/forwarded_port    # or PORT_FILE_PATH if needed
      - TZ=${TZ}
    volumes:
      - ${VPN_CONFIG}:/gluetun
      - ${VPN_CONFIG}/tmp:/tmp/gluetun:ro
    restart: unless-stopped
