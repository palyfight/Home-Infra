networks:
  arrs:
    external: true
    name: arrs
  qbit:
    external: true
    name: qbit
  plex:
    external: true
    name: plex
  tailscale:
    external: true
    name: tailscale

services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    environment:
      HOMEPAGE_ALLOWED_HOSTS: 192.168.1.176:3000 # required, may need port. See gethomepage.dev/installation/#homepage_allowed_hosts
      PUID: ${PUID} # optional, your user id
      PGID: ${PGID} # optional, your group id
    ports:
      - 3000:3000
    volumes:
      # - ${HOMEPAGE_CONFIG}:/app/config # Make sure your local config directory exists
      - ./homepage-config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro # optional, for docker integrations
    networks:
      - qbit
      - arrs
      - plex
    restart: unless-stopped

  labelarr:
    image: ghcr.io/nullable-eth/labelarr:latest
    container_name: labelarr
    environment:
      # Required - Get from Plex Web (F12 → Network → X-Plex-Token)
      - PLEX_TOKEN=${PLEX_TOKEN}
      # Required - Get from https://www.themoviedb.org/settings/api
      - TMDB_READ_ACCESS_TOKEN=${TMDB_READ_ACCESS_TOKEN}
      # Required - Your Plex server details
      - PLEX_SERVER=${PLEX_SERVER}
      - PLEX_PORT=32400
      - PLEX_REQUIRES_HTTPS=false
      # Process all libraries (recommended for first-time users)
      - MOVIE_PROCESS_ALL=true
      - TV_PROCESS_ALL=true
      # Optional settings
      - PROCESS_TIMER=1h
      - UPDATE_FIELD=genre  # or 'label' but requires plexpass
      # Optional Radarr/Sonarr integration
      - USE_RADARR=true
      - RADARR_URL=http://radarr:7878
      - RADARR_API_KEY=${RADARR_API_KEY}
      - USE_SONARR=true
      - SONARR_URL=http://sonarr:8989
      - SONARR_API_KEY=${SONARR_API_KEY}
      # Optional export functionality
      # - EXPORT_LABELS=action,comedy,thriller,documentary,kids
      # - EXPORT_LOCATION=/data/exports
    volumes:
      - ${LABELARR_CONFIG}:/data
      - ${LABELARR_EXPORTS}:/data/exports  # Mount host directory for export files
    networks:
      - arrs
      - plex
    restart: unless-stopped

  wizarr:
    container_name: wizarr
    image: ghcr.io/wizarrrr/wizarr
    environment:
      - PUID=${PUID} #Set UID
      - PGID=${PGID} #Set GID
      - DISABLE_BUILTIN_AUTH=false #Set to true ONLY if you are using another auth provider (Authelia, Authentik, etc)
      - TZ=${TZ} #Set your timezone here
    ports:
      - 5690:5690
    volumes:
      - ${WIZARR_CONFIG}/appdata:/data
    networks:
      - plex
      - tailscale
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=tailscale"  # ensure Traefik uses this network
      ## HTTP Routers
      - "traefik.http.routers.wizarr.rule=Host(`wizarr.${TAILNET_SUFFIX}.${DOMAIN_BASE}`)"
      - "traefik.http.routers.wizarr.entrypoints=websecure"
      - "traefik.http.routers.wizarr.tls=true"
      - "traefik.http.routers.wizarr.tls.certresolver=letsencrypt"
      ## HTTP Services
      - "traefik.http.services.wizarr.loadbalancer.server.port=5690"
    restart: unless-stopped

  tdarr:
    container_name: tdarr
    image: ghcr.io/haveagitgat/tdarr:latest
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - nodeName=tdarr-internal-worker
      - serverIP=0.0.0.0
      - serverPort=8266
      - webUIPort=8265
      - inContainer=true
      - internalNode=true
      - ffmpegVersion=7
      - auth=false
      - openBrowser=true
      - maxLogSizeMB=10
      - cronPluginUpdate=
    volumes:
      - ${TDARR_HOME_DIR}/server:/app/server
      - ${TDARR_HOME_DIR}/configs:/app/configs
      - ${TDARR_HOME_DIR}/logs:/app/logs
      - ${MEDIA_PATH_DATA}:/media
      - ${MEDIA_PATH_DATA}/transcode_cache:/temp
    ports:
      - 8265:8265 # webUI port
      - 8266:8266 # server port
    networks:
      - arrs
    devices:
      - /dev/dri:/dev/dri
    restart: unless-stopped

  tdarr-node:
    container_name: tdarr-node
    image: ghcr.io/haveagitgat/tdarr_node:latest
    network_mode: service:tdarr
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - nodeName=tdarr-external-node
      - serverIP=0.0.0.0
      - serverPort=8266
      - inContainer=true
      - ffmpegVersion=7
      - nodeType=mapped
      - priority=-1
      - cronPluginUpdate=
      - apiKey=
      - maxLogSizeMB=10
      - pollInterval=2000
      - startPaused=false
      - transcodegpuWorkers=3
      - transcodecpuWorkers=0
      - healthcheckgpuWorkers=1
      - healthcheckcpuWorkers=1
    volumes:
      - ${TDARR_HOME_DIR}/configs:/app/configs
      - ${TDARR_HOME_DIR}/logs:/app/logs
      - ${MEDIA_PATH_DATA}:/media
      - ${MEDIA_PATH_DATA}/transcode_cache:/temp
    devices:
      - /dev/dri:/dev/dri
    restart: unless-stopped
