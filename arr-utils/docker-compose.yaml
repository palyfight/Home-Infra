networks:
  arrs:
    external: true
    name: arrs
  qbit:
    external: true
    name: qbit
  plex:
    external: true
    name: plex

services:
  homarr:
    image: ghcr.io/homarr-labs/homarr:latest
    container_name: homarr
    environment:
      - SECRET_ENCRYPTION_KEY=139520061bb849531ac9bce1307db3b30adee733e661be788ee229fca5d6979f
    volumes:
      # - /var/run/docker.sock:/var/run/docker.sock # Optional, only if you want docker integration
      - ./homarr/appdata:/appdata
    ports:
      - '7575:7575'
    networks:
      - qbit
      - arrs
      - plex
    restart: unless-stopped

  cleanuparr:
    image: ghcr.io/cleanuparr/cleanuparr:latest
    container_name: cleanuparr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=${UMASK}
      - PORT=11011
      - BASE_PATH=
    volumes:
      - ${CLEANUPARR_CONFIG}:/config
      - ${CLEANUPARR_MEDIA}:/downloads #optional
    ports:
      - "11011:11011"
    networks:
      - qbit
      - arrs
    restart: unless-stopped
