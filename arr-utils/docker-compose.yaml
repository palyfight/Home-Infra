networks:
  arrs:
    external: true
    name: arrs
  qbit:
    external: true
    name: qbit
  plex:
    external: true
    name: plex

services:
  homarr:
    image: ghcr.io/homarr-labs/homarr:latest
    container_name: homarr
    environment:
      - SECRET_ENCRYPTION_KEY=139520061bb849531ac9bce1307db3b30adee733e661be788ee229fca5d6979f
    volumes:
      # - /var/run/docker.sock:/var/run/docker.sock # Optional, only if you want docker integration
      - ${HOMARR_CONFIG}:/appdata
    ports:
      - '7575:7575'
    networks:
      - qbit
      - arrs
      - plex
    restart: unless-stopped

  labelarr:
    image: ghcr.io/nullable-eth/labelarr:latest
    container_name: labelarr
    environment:
      # Required - Get from Plex Web (F12 → Network → X-Plex-Token)
      - PLEX_TOKEN=${PLEX_TOKEN}
      # Required - Get from https://www.themoviedb.org/settings/api
      - TMDB_READ_ACCESS_TOKEN=${TMDB_READ_ACCESS_TOKEN}
      # Required - Your Plex server details
      - PLEX_SERVER=${PLEX_SERVER}
      - PLEX_PORT=32400
      - PLEX_REQUIRES_HTTPS=false
      # Process all libraries (recommended for first-time users)
      - MOVIE_PROCESS_ALL=true
      - TV_PROCESS_ALL=true
      # Optional settings
      - PROCESS_TIMER=1h
      - UPDATE_FIELD=genre  # or 'label' but requires plexpass
      # Optional Radarr/Sonarr integration
      - USE_RADARR=true
      - RADARR_URL=http://radarr:7878
      - RADARR_API_KEY=${RADARR_API_KEY}
      - USE_SONARR=true
      - SONARR_URL=http://sonarr:8989
      - SONARR_API_KEY=${SONARR_API_KEY}
      # Optional export functionality
      # - EXPORT_LABELS=action,comedy,thriller,documentary,kids
      # - EXPORT_LOCATION=/data/exports
    volumes:
      - ${LABELARR_CONFIG}:/data
      - ${LABELARR_EXPORTS}:/data/exports  # Mount host directory for export files
    networks:
      - arrs
      - plex
    restart: unless-stopped

  decluttarr:
    image: ghcr.io/manimatter/decluttarr:latest
    container_name: decluttarr
    environment:
      TZ: ${TZ}
      PUID: ${PUID}
      PGID: ${PGID}

      LOG_LEVEL: INFO
      TEST_RUN: True
      TIMER: 10
      
      # # --- Optional: Job Defaults ---
      # You can use these to set those parameters across all jobs. If you don't specify it here, the defaults set by system will be used
      # If you set job-specific parameters (further down below), they will override these settings.
      max_strikes: 3
      MIN_DAYS_BETWEEN_SEARCHES: 7
      MAX_CONCURRENT_SEARCHES: 3

      # # --- Jobs (short notation) ---
      # If you want to go with the most basic settings, you can just turn them all on:
      REMOVE_BAD_FILES: True
      REMOVE_FAILED_DOWNLOADS: True
      REMOVE_FAILED_IMPORTS: True
      REMOVE_METADATA_MISSING: True
      REMOVE_MISSING_FILES: True
      REMOVE_ORPHANS: True
      REMOVE_SLOW: True
      REMOVE_STALLED: True
      REMOVE_UNMONITORED: True
      SEARCH_BETTER: True
      SEARCH_MISSING: True
      DETECT_DELETIONS: True

      # --- Instances ---
      SONARR: >
        - base_url: "http://sonarr:8989"
          api_key: "$SONARR_API_KEY"

      RADARR: >
        - base_url: "http://radarr:7878"
          api_key: "$RADARR_API_KEY"

      # --- Download Clients ---
      QBITTORRENT: >
        - base_url: "http://vpn:8080"
          username: "$QBIT_USERNAME" # (optional -> if not provided, assuming not needed)
          password: "$QBIT_PASSWORD" # (optional -> if not provided, assuming not needed)
          name: "qbittorrent" # (optional -> if not provided, assuming "qBittorrent". Must correspond with what is specified in your *arr as download client name)
    volumes:
      # - $DOCKERDIR/appdata/decluttarr/logs:/app/logs # Uncomment to get logs in text file, too      
      # - ${HOST_PATH_DATA}:/data # If you use detect_deletions, add the identical mount paths that you use in your sonarr/radarr instances. This may be different to this example!
    networks:
      - qbit
      - arrs
    restart: unless-stopped
