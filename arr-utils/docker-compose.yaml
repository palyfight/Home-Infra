networks:
  arrs:
    external: true
    name: arrs
  qbit:
    external: true
    name: qbit
  plex:
    external: true
    name: plex

services:
  homarr:
    image: ghcr.io/homarr-labs/homarr:latest
    container_name: homarr
    environment:
      - SECRET_ENCRYPTION_KEY=139520061bb849531ac9bce1307db3b30adee733e661be788ee229fca5d6979f
    volumes:
      # - /var/run/docker.sock:/var/run/docker.sock # Optional, only if you want docker integration
      - ${HOMARR_CONFIG}:/appdata
    ports:
      - '7575:7575'
    networks:
      - qbit
      - arrs
      - plex
    restart: unless-stopped

  labelarr:
    image: ghcr.io/nullable-eth/labelarr:latest
    container_name: labelarr
    environment:
      # Required - Get from Plex Web (F12 → Network → X-Plex-Token)
      - PLEX_TOKEN=${PLEX_TOKEN}
      # Required - Get from https://www.themoviedb.org/settings/api
      - TMDB_READ_ACCESS_TOKEN=${TMDB_READ_ACCESS_TOKEN}
      # Required - Your Plex server details
      - PLEX_SERVER=${PLEX_SERVER}
      - PLEX_PORT=32400
      - PLEX_REQUIRES_HTTPS=false
      # Process all libraries (recommended for first-time users)
      - MOVIE_PROCESS_ALL=true
      - TV_PROCESS_ALL=true
      # Optional settings
      - PROCESS_TIMER=1h
      - UPDATE_FIELD=genre  # or 'label' but requires plexpass
      # Optional Radarr/Sonarr integration
      - USE_RADARR=true
      - RADARR_URL=http://radarr:7878
      - RADARR_API_KEY=${RADARR_API_KEY}
      - USE_SONARR=true
      - SONARR_URL=http://sonarr:8989
      - SONARR_API_KEY=${SONARR_API_KEY}
      # Optional export functionality
      # - EXPORT_LABELS=action,comedy,thriller,documentary,kids
      # - EXPORT_LOCATION=/data/exports
    volumes:
      - ${LABELARR_CONFIG}:/data
      - ${LABELARR_EXPORTS}:/data/exports  # Mount host directory for export files
    networks:
      - arrs
      - plex
    restart: unless-stopped

  tdarr:
    container_name: tdarr
    image: ghcr.io/haveagitgat/tdarr:latest
    restart: unless-stopped
    network_mode: bridge
    ports:
      - 8265:8265 # webUI port
      - 8266:8266 # server port
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - nodeName=tdarr-internal-worker
      - serverIP=0.0.0.0
      - serverPort=8266
      - webUIPort=8265
      - inContainer=true
      - internalNode=true
      - ffmpegVersion=7
      - auth=false
      - openBrowser=true
      - maxLogSizeMB=10
      - cronPluginUpdate=
    volumes:
      - ${TDARR_HOME_DIR}/server:/app/server
      - ${TDARR_HOME_DIR}/configs:/app/configs
      - ${TDARR_HOME_DIR}/logs:/app/logs
      - ${MEDIA_PATH_DATA}:/media
      - ${TDARR_HOME_DIR}/transcode_cache:/temp
    devices:
      - /dev/dri:/dev/dri

# node example
  tdarr-node:
    container_name: tdarr-node
    image: ghcr.io/haveagitgat/tdarr_node:latest
    restart: unless-stopped
    network_mode: service:tdarr
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - nodeName=tdarr-external-node
      - serverIP=0.0.0.0
      - serverPort=8266
      - inContainer=true
      - ffmpegVersion=7
      - nodeType=mapped
      - priority=-1
      - cronPluginUpdate=
      - apiKey=
      - maxLogSizeMB=10
      - pollInterval=2000
      - startPaused=false
      - transcodegpuWorkers=2
      - transcodecpuWorkers=1
      - healthcheckgpuWorkers=1
      - healthcheckcpuWorkers=1
    volumes:
      - ${TDARR_HOME_DIR}/configs:/app/configs
      - ${TDARR_HOME_DIR}/logs:/app/logs
      - ${MEDIA_PATH_DATA}:/media
      - ${TDARR_HOME_DIR}/transcode_cache:/temp
    devices:
      - /dev/dri:/dev/dri
