---
# /app/config/settings.yaml

title: Homelab Dashboard
background:
  # Uses a high-quality minimal dark background from Unsplash
  image: /images/background.jpg # "https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop"
  opacity: 50 # Dim the background to make text readable

theme: dark

color: slate

layout:
  Media:
    style: row
    columns: 4
  Automation:
    style: row
    columns: 3
  Downloads:
    style: row
    columns: 3
  Infrastructure:
    style: row
    columns: 4
  Cloud/Networking:
    style: row
    columns: 3
  Gaming:
    style: row
    columns: 1
  Utilities:
    style: row
    columns: 3

headerStyle: clean

# This enables the "ping" dots on the cards to show if a service is online
statusStyle: dot
