    - qBittorrent:
        icon: qbittorrent.png
        href: http://192.168.1.176:8080
        description: Downloader
        # --- NEW: Docker Status (qBittorrent is likely inside the 'vpn' container group, so we will monitor the 'vpn' container instead) ---
        server: my-docker
        container: vpn
        widget:
          type: qbittorrent
          url: http://vpn:8080
          username: { your-username } # Replace with your qBittorrent username
          password: { your-password } # Replace with your qBittorrent password

