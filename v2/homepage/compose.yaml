networks:
  arrs:
    external: true
    name: arrs
  qbit:
    external: true
    name: qbit
  immich:
    external: true
    name: immich
  extras:
    external: true
    name: extras

services:
  dockerproxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:latest
    container_name: dockerproxy
    environment:
      - CONTAINERS=1 # Allow access to viewing containers
      - SERVICES=1 # Allow access to viewing services (necessary when using Docker Swarm)
      - TASKS=1 # Allow access to viewing tasks (necessary when using Docker Swarm)
      - POST=0 # Disallow any POST operations (effectively read-only)
    ports:
      - 127.0.0.1:2375:2375
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro # Mounted as read-only
    networks:
      - qbit
      - arrs
      - immich
      - extras
    restart: unless-stopped

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    depends_on:
      - dockerproxy
    environment:
      HOMEPAGE_ALLOWED_HOSTS: 192.168.1.176:3000 # required, may need port. See gethomepage.dev/installation/#homepage_allowed_hosts
      PUID: ${PUID} # optional, your user id
      PGID: ${PGID} # optional, your group id
    ports:
      - 3000:3000
    volumes:
      # - ${HOMEPAGE_CONFIG}:/app/config # Make sure your local config directory exists
      - ./homepage-config:/app/config
      - ./homepage-config/images:/app/public/images
      # - /var/run/docker.sock:/var/run/docker.sock # optional, for docker integrations
      - /mnt/ssd:/mnt/ssd:ro # optional, for 1TB SSD disk usage widget
      - /mnt/nas:/mnt/nas:ro # optional, for NAS disk usage widget
    networks:
      - qbit
      - arrs
      - immich
      - extras
    restart: unless-stopped

  glances:
    image: nicolargo/glances:latest-full
    container_name: glances
    # Use host PID namespace to see full system processes and stats
    pid: host 
    environment:
      - GLANCES_OPT=-w # Run Glances in web server mode
      - TZ=${TZ}
    ports:
      # Glances Web UI Port
      - 61208:61208 
    volumes:
      # Access to Docker Socket for container stats (like you did for Homepage)
      - /var/run/docker.sock:/var/run/docker.sock:ro 
      # *** ESSENTIAL FOR INTEL GPU MONITORING ***
      # Gives Glances access to the integrated GPU device files on the host
      - /dev/dri:/dev/dri 
    restart: unless-stopped

  speedtest-tracker:
    image: lscr.io/linuxserver/speedtest-tracker:latest
    container_name: speedtest-tracker
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - APP_KEY=${SPEEDTEST_APP_KEY}
      - DB_CONNECTION=sqlite
      - SPEEDTEST_SCHEDULE=0 13 * * 6 #optional - every Saturday at 1pm
      - PRUNE_RESULTS_OLDER_THAN=30 #optional - 30 days
    volumes:
      - /mnt/ssd/configs/extras/speedtest:/config
    ports:
      - 8765:80
    restart: unless-stopped
