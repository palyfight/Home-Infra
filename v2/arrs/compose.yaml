networks:
  arrs:
    name: arrs
    driver: bridge
  vpn:
    external: true
    name: vpn
  tailscale:
    external: true
    name: tailscale

services:
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${SSD_PATH}/configs/radarr-config:/config
      - ${NAS_PATH}:/data
    ports:
      - 7878:7878
    networks:
      - vpn
      - arrs
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${SSD_PATH}/configs/sonarr-config:/config
      - ${NAS_PATH}:/data
    ports:
      - 8989:8989
    networks:
      - vpn
      - arrs
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${SSD_PATH}/configs/prowlarr-config:/config
    ports:
      - 9696:9696
    networks:
      - vpn
      - arrs
    restart: unless-stopped

  notifiarr:
    image: golift/notifiarr:latest
    container_name: notifiarr
    hostname: notifiarr
    volumes:
      - ${SSD_PATH}/configs/notifiarr-config:/config
      - /var/run/utmp:/var/run/utmp
      - /etc/machine-id:/etc/machine-id
    ports:
      - 5454:5454
    networks:
      - vpn
      - arrs
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FILE=${LOG_FILE:-none}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=${TZ}
    volumes:
      - ${SSD_PATH}/configs/flaresolverr-config:/config
    ports:
      - "8191:8191"
    networks:
      - arrs
    restart: unless-stopped

  jellyseerr:
    image: ghcr.io/fallenbagel/jellyseerr:latest
    init: true
    container_name: jellyseerr
    environment:
      - LOG_LEVEL=debug
      - TZ=${TZ}
      - PORT=5055 #optional
    ports:
      - 5055:5055
    volumes:
      - ${SSD_PATH}/configs/jellyseerr-config:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    labels:
      - traefik.enable=true
      - traefik.docker.network=tailscale  # ensure Traefik uses this network
      - traefik.http.routers.jellyseerr.rule=Host(`jellyseerr.${TAILNET_SUFFIX}.${DOMAIN_BASE}`)
      - traefik.http.routers.jellyseerr.entrypoints=websecure
      - traefik.http.routers.jellyseerr.tls.certresolver=letsencrypt
      - traefik.http.services.jellyseerr.loadbalancer.server.port=5055 # Traefik’s server.port should match the container’s internal port (9000), not the host port (9925)
    networks:
      - arrs
      - tailscale
    restart: unless-stopped

  labelarr:
    image: ghcr.io/nullable-eth/labelarr:latest
    container_name: labelarr
    environment:
      # Required - Get from Plex Web (F12 → Network → X-Plex-Token)
      - PLEX_TOKEN=${PLEX_TOKEN}
      # Required - Get from https://www.themoviedb.org/settings/api
      - TMDB_READ_ACCESS_TOKEN=${TMDB_READ_ACCESS_TOKEN}
      # Required - Your Plex server details
      - PLEX_SERVER=${PLEX_SERVER}
      - PLEX_PORT=32400
      - PLEX_REQUIRES_HTTPS=false
      # Process all libraries (recommended for first-time users)
      - MOVIE_PROCESS_ALL=true
      - TV_PROCESS_ALL=true
      # Optional settings
      - PROCESS_TIMER=1h
      - UPDATE_FIELD=genre  # or 'label' but requires plexpass
      # Optional Radarr/Sonarr integration
      - USE_RADARR=true
      - RADARR_URL=http://radarr:7878
      - RADARR_API_KEY=${RADARR_API_KEY}
      - USE_SONARR=true
      - SONARR_URL=http://sonarr:8989
      - SONARR_API_KEY=${SONARR_API_KEY}
      # Optional export functionality
      # - EXPORT_LABELS=action,comedy,thriller,documentary,kids
      # - EXPORT_LOCATION=/data/exports
    volumes:
      - ${SSD_PATH}/configs/labelarr-config:/data
      - ${SSD_PATH}/labelarr/labelarr-exports:/data/exports  # Mount host directory for export files
    networks:
      - arrs
    restart: unless-stopped

  tracearr:
    image: ghcr.io/connorgallopo/tracearr:supervised
    container_name: tracearr
    ports:
      - "${PORT:-3333}:3000"
    environment:
      - TZ=${TZ:-UTC}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # Optional: Override auto-generated secrets
      # - JWT_SECRET=${JWT_SECRET}
      # - COOKIE_SECRET=${COOKIE_SECRET}
    volumes:
      - ${SSD_PATH}/tracearr/postgres:/data/postgres
      - ${SSD_PATH}/tracearr/redis:/data/redis
      - ${SSD_PATH}/tracearr/data:/data/tracearr
    networks:
      - arrs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
  
  unpackerr:
    image: golift/unpackerr
    container_name: unpackerr
    user: 1000:1000
    environment:
      - TZ=${TZ}
      - UN_LOG_FILE=/data/unpackerr.log
      - UN_SONARR_0_URL=http://sonarr:8989
      - UN_SONARR_0_API_KEY=${SONARR_API_KEY}
      - UN_RADARR_0_URL=http://radarr:7878
      - UN_RADARR_0_API_KEY=${RADARR_API_KEY}
    volumes:
      - ${NAS_PATH}:/data
    networks:
      - arrs
    restart: unless-stopped

  ytdl-sub:
    # The GUI image variant:
    image: ghcr.io/jmbannon/ytdl-sub-gui:latest
    # Or use the headless image variant:
    # image: ghcr.io/jmbannon/ytdl-sub:latest
    # For CPU/GPU passthrough, use the GUI image above or the headless Ubuntu image:
    # image: ghcr.io/jmbannon/ytdl-sub:ubuntu-latest
    container_name: ytdl-sub
    environment:
      - TZ=${TZ}
      # Set these as appropriate so your users can access the downloaded files in
      # your library:
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${SSD_PATH}/configs/ytdl-config:/config
      - ${NAS_PATH}/media/tv:/tv_shows
      - ${NAS_PATH}/media/movies:/movies
    # Not necessary for the headless image variant:
    ports:
      - 8443:8443
    # Optionally passthrough the CPU for hardware acceleration:
    # devices:
    #   - /dev/dri:/dev/dri
    # Optionally passthrough the GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: ["gpu"]
    networks:
      - arrs
    restart: unless-stopped
