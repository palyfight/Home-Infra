  gluetun:
    image: qmcgaw/gluetun:v3
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 8080:8080/tcp # qBittorrent web UI port
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - FIREWALL_OUTBOUND_SUBNETS=192.168.1.0/24
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=${VPN_TYPE}
      - VPN_PORT_FORWARDING=on
      - VPN_PORT_FORWARDING_PROVIDER=protonvpn
      - VPN_PORT_FORWARDING_UP_COMMAND=/bin/sh -c 'wget -O- --retry-connrefused --post-data "json={\"listen_port\":{{PORTS}}}" http://127.0.0.1:8080/api/v2/app/setPreferences 2>&1'
      - HTTPPROXY=off
      - SHADOWSOCKS=off
    volumes:
      - ${SSD_PATH}/configs/gluetun-config:/gluetun
      - ./auth:/gluetun/auth # for openvpn auth file: https://github.com/qdm12/gluetun-wiki/blob/main/setup/advanced/control-server.md#authentication
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - ${SSD_PATH}/configs/qbittorrent-config:/config
      - ${NAS_PATH}:/data
    restart: unless-stopped
