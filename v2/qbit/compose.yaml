networks:
  vpn:
    name: vpn
    driver: bridge

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  vpn:
    image: qmcgaw/gluetun
    container_name: vpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 8080:8080     # qBittorrent WebUI (optional, remove if not needed)
    environment:
      # Timezone
      - TZ=${TZ}
      
      # VPN / WireGuard settings
      # - SERVER_HOSTNAMES=ch-430.protonvpn.net
      # - WIREGUARD_ADDRESSES=10.2.0.2/32
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=${VPN_TYPE}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - OPENVPN_USER=${OPENVPN_USER}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
      - SERVER_COUNTRIES=${SERVER_COUNTRIES}
      
      # DNS settings — using DOH instead of DOT (encrypted)
      # - DNS_UPSTREAM_RESOLVER_TYPE=doh
      # - DNS_UPSTREAM_RESOLVERS=cloudflare,google,quad9,libredns 
      # - DNS_ADDRESS=127.0.0.11

      # Firewall / port-forwarding
      - VPN_PORT_FORWARDING=on
      - PORT_FORWARD_ONLY=true
      - VPN_PORT_FORWARDING_STATUS_FILE=${VPN_PORT_FORWARDING_STATUS_FILE}
    volumes:
      - ${SSD_PATH}/configs/vpn-config:/gluetun
      - ${SSD_PATH}/configs/vpn-config/tmp:/tmp/gluetun
      # - ./config.toml:/gluetun/auth/config.toml:ro,z
      - ./auth:/gluetun/auth
    networks:
      - vpn
    restart: unless-stopped
    logging: *default-logging

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    # use https://ipleak.net/ to verify VPN is working
    network_mode: "service:vpn"       # routes all qBittorrent traffic through VPN container
    depends_on:
      vpn:
        condition: service_healthy
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - ${SSD_PATH}/configs/qbittorrent-config:/config
      - ${NAS_PATH}:/data
    restart: unless-stopped
    logging: *default-logging

  gluetun-qbittorrent-port-manager:
    image: jopiermeier/gluetun-qbittorrent-port-manager:latest
    container_name: gluetun-qbittorrent-port-manager
    network_mode: "service:vpn"
    depends_on:
      - vpn
      - qbittorrent
    environment:
      - QBITTORRENT_SERVER=localhost
      - QBITTORRENT_PORT=8080
      - QBITTORRENT_USER=${QBIT_USER}
      - QBITTORRENT_PASS=${QBIT_PASS}
      - PORT_FILE=${VPN_PORT_FORWARDING_STATUS_FILE}    # or PORT_FILE_PATH if needed
      - TZ=${TZ}
    volumes:
      - ${SSD_PATH}/configs/vpn-config:/gluetun # must match gluetun container
      - ${SSD_PATH}/configs/vpn-config/tmp:/tmp/gluetun:ro # must match gluetun container
    restart: unless-stopped
