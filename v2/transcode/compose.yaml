networks:
  arrs:
    external: true
    name: arrs

services:
  tdarr:
    container_name: tdarr
    image: ghcr.io/haveagitgat/tdarr:latest
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - nodeName=tdarr-internal-worker
      - serverIP=0.0.0.0
      - serverPort=8266
      - webUIPort=8265
      - inContainer=true
      - internalNode=true
      - ffmpegVersion=7
      - auth=false
      - openBrowser=true
      - maxLogSizeMB=10
      - cronPluginUpdate=
    volumes:
      - ${SSD_PATH}/tdarr/server:/app/server
      - ${SSD_PATH}/tdarr/configs:/app/configs
      - ${SSD_PATH}/tdarr/logs:/app/logs
      - ${NAS_PATH}:/media
      - ${NAS_PATH}/transcode_cache:/temp
    ports:
      - 8265:8265 # webUI port
      - 8266:8266 # server port
    networks:
      - arrs
    devices:
      - /dev/dri:/dev/dri
    restart: unless-stopped

  tdarr-node:
    container_name: tdarr-node
    image: ghcr.io/haveagitgat/tdarr_node:latest
    network_mode: service:tdarr
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - nodeName=tdarr-external-node
      - serverIP=0.0.0.0
      - serverPort=8266
      - inContainer=true
      - ffmpegVersion=7
      - nodeType=mapped
      - priority=-1
      - cronPluginUpdate=
      - apiKey=
      - maxLogSizeMB=10
      - pollInterval=2000
      - startPaused=false
      - transcodegpuWorkers=3
      - transcodecpuWorkers=0
      - healthcheckgpuWorkers=1
      - healthcheckcpuWorkers=1
    volumes:
      - ${SSD_PATH}/tdarr/configs:/app/configs
      - ${SSD_PATH}/tdarr/logs:/app/logs
      - ${NAS_PATH}:/media
      - ${NAS_PATH}/transcode_cache:/temp
    devices:
      - /dev/dri:/dev/dri
    restart: unless-stopped
