server {
    listen 80;
    server_name _;   # or specific host

    # Jellyseerr path
    location /jellyseerr/ {
        proxy_pass http://jellyseerr:5055/;   # assumes container name jellyseerr, port 5055
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # maybe other headers depending on app needs
    }

    # Plex web UI path
    location /plex/ {
        proxy_pass http://127.0.0.1:32400/;   # since nginx shares tailscale-nginx net namespace: 127.0.0.1 is host
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Plex native port /tcp forwarding can't be handled via HTTP proxy
    # So you will still rely on Tailscale forwarding (if needed) for clients/Apps
}
