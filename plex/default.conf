server {
    listen 80;
    server_name _;

    # If you want HTTPS, you can add SSL config here.
    # For now, using HTTP for simplicity.

    # Jellyseerr under sub-path
    location /jellyseerr/ {
        rewrite ^/jellyseerr(/.*)$ $1 break;
        proxy_pass          http://jellyseerr:5055/;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $http_connection;
    }

    # Plex Web UI under sub-path
    location /plex/ {
        rewrite ^/plex(/.*)$ $1 break;
        # Replace HOST_IP with your host’s IP reachable by nginx container => 172.19.0.1
        proxy_pass http://172.19.0.1:32400/;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        # For streaming, disable buffering
        proxy_buffering off;
    }
}
