networks:
  arrs:
    external: true
    name: arrs
  plex:
    name: plex
    driver: bridge

services:
  plex:
    image: lscr.io/linuxserver/plex
    container_name: plex
    network_mode: host
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - VERSION=${VERSION}
      - PLEX_CLAIM=${PLEX_CLAIM}
    volumes:
      - ${PLEX_CONFIG}:/config
      - ${PLEX_HOST_PATH_DATA}:/data/media
    restart: unless-stopped

  tautulli:
    image: ghcr.io/tautulli/tautulli
    container_name: tautulli
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${TAUTULLI_CONFIG}:/config
    ports:
      - 8181:8181
    networks:
      - plex
    restart: unless-stopped

  jellyseerr:
    image: ghcr.io/fallenbagel/jellyseerr:latest
    init: true
    container_name: jellyseerr
    environment:
      - LOG_LEVEL=debug
      - TZ=${TZ}
      - PORT=5055 #optional
    # ports:
    #   - 5055:5055
    volumes:
      - ${JELLYSEERR_CONFIG}:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    networks:
      - arrs
      - plex
    restart: unless-stopped

  tailscale:
    image: tailscale/tailscale:latest
    container_name: media-gateway
    hostname: media-gateway
    environment:
      - TS_AUTHKEY=${TAILSCALE_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=true         # no /dev/net/tun, no NET_ADMIN
      - TS_SERVE_CONFIG=/config/serve.json # Tailscale Serve configuration to expose the web interface on your local Tailnet - remove this line if not required
      - TS_LOCAL_ADDR_PORT=127.0.0.1:41234       # The <addr>:<port> for the healthz endpoint
      - TS_ENABLE_HEALTH_CHECK=true              # Enable healthcheck endpoint: "/healthz"
      #- TS_ACCEPT_DNS=true # Uncomment when using MagicDNS
    volumes:
      - ${TAILSCALE_CONFIG}/config:/config # Config folder used to store Tailscale files - you may need to change the path
      - ${TAILSCALE_CONFIG}/state:/var/lib/tailscale # Tailscale requirement - you may need to change the path
    networks:
      - plex
    command:
      - /bin/sh
      - -c
      - |
        set -e

        # Start tailscaled in *userspace networking* and with netfilter disabled (no iptables calls)
        tailscaled --state=/var/lib/tailscale/tailscaled.state \
                  --tun=userspace-networking \
                  --netfilter-mode=off &

        # Bring the node up (auth) — since we overrode the entrypoint, we must do this ourselves
        until tailscale status >/dev/null 2>&1; do
          tailscale up --authkey="${TS_AUTHKEY}" --hostname="${HOSTNAME:-media-gateway}" || true
          sleep 1
        done

        # Figure out the host's Docker bridge gateway (to reach Plex on host networking)
        HOST_GW="$(ip route | awk '/^default/ {print $3; exit}')"
        echo "Detected Docker bridge gateway: ${HOST_GW}"

        # Serve Jellyseerr at an HTTPS path on your tailnet node
        tailscale serve https /jellyseerr http://jellyseerr:5055

        # Forward Plex's native TCP port for apps/clients
        # tailscale serve tcp 32400 ${HOST_GW}:32400

        # Optional: expose Plex Web UI under a path (uncomment if you want it)
        tailscale serve https /plex http://${HOST_GW}:32400

        # Keep container running
        sleep infinity
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:41234/healthz"] # Check Tailscale has a Tailnet IP and is operational
      interval: 1m # How often to perform the check
      timeout: 10s # Time to wait for the check to succeed
      retries: 3 # Number of retries before marking as unhealthy
      start_period: 10s # Time to wait before starting health checks
    restart: unless-stopped
