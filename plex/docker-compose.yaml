networks:
  arrs:
    external: true
    name: arrs
  plex:
    name: plex
    driver: bridge

services:
  plex:
    image: lscr.io/linuxserver/plex
    container_name: plex
    network_mode: host
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - VERSION=${VERSION}
      - PLEX_CLAIM=${PLEX_CLAIM}
    volumes:
      - ${PLEX_CONFIG}:/config
      - ${PLEX_HOST_PATH_DATA}:/data/media
    restart: unless-stopped

  tautulli:
    image: ghcr.io/tautulli/tautulli
    container_name: tautulli
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${TAUTULLI_CONFIG}:/config
    ports:
      - 8181:8181
    networks:
      - plex
    restart: unless-stopped

  jellyseerr:
    image: ghcr.io/fallenbagel/jellyseerr:latest
    init: true
    container_name: jellyseerr
    environment:
      - LOG_LEVEL=debug
      - TZ=${TZ}
      - PORT=5055 #optional
    # ports:
    #   - 5055:5055
    volumes:
      - ${JELLYSEERR_CONFIG}:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    networks:
      - arrs
      - plex
    restart: unless-stopped

  tailscale:
    image: tailscale/tailscale:latest
    container_name: media-gateway
    hostname: media-gateway
    environment:
      - TS_AUTHKEY=${TAILSCALE_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
      # TS_USERSPACE=true  (optional if you want userspace mode)
    volumes:
      - ${TAILSCALE_CONFIG}/config:/config # Config folder used to store Tailscale files - you may need to change the path
      - ${TAILSCALE_CONFIG}/state:/var/lib/tailscale # Tailscale requirement - you may need to change the path
    networks:
      - plex
    # No devices or cap_add if using userspace mode; if you use kernel mode, you'd need /dev/net/tun etc
    command: ["tailscaled", "--state=/var/lib/tailscale/tailscaled.state"]
    healthcheck:
      test: ["CMD", "tailscale", "ip", "-4"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
