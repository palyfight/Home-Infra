services:
  stirling-pdf:
    image: docker.stirlingpdf.com/stirlingtools/stirling-pdf:latest
    container_name: stirling-pdf
    environment:
      - DISABLE_ADDITIONAL_FEATURES=false
      - LANGS=en_GB
    volumes:
      - ${STIRLING_PDF_HOME_DIR}/trainingData:/usr/share/tessdata # Required for extra OCR languages
      - ${STIRLING_PDF_HOME_DIR}/extraConfigs:/configs
      - ${STIRLING_PDF_HOME_DIR}/customFiles:/customFiles/
      - ${STIRLING_PDF_HOME_DIR}/logs:/logs/
      - ${STIRLING_PDF_HOME_DIR}/pipeline:/pipeline/
    ports:
      - '8282:8080'
    restart: unless-stopped
    
  dockge:
    image: louislam/dockge:1
    environment:
      # Tell Dockge where to find the stacks
      - DOCKGE_STACKS_DIR=/opt/stacks
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DOCKGE_HOME_DIR}:/app/data
      # Stacks Directory
      # ⚠️ READ IT CAREFULLY. If you did it wrong, your data could end up writing into a WRONG PATH.
      # ⚠️ 1. FULL path only. No relative path (MUST)
      # ⚠️ 2. Left Stacks Path === Right Stacks Path (MUST)
      - /opt/stacks:/opt/stacks
    ports:
      - 5001:5001
    restart: unless-stopped
