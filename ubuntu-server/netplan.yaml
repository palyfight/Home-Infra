# Sample netplan configuration to set a static ethernet IP address
# and disable wifi interface
network:
  version: 2
  renderer: networkd
  ethernets:
    enp1s0:
      dhcp4: no
      addresses:
        - 192.168.1.176/24
      routes:
        - to: default
          via: 192.168.1.1
      nameservers:
        addresses:
          - 8.8.8.8
          - 1.1.1.1
      optional: false
  wifis:
    wlp2s0:
      dhcp4: no
      dhcp6: no
      optional: true
      activation-mode: off
